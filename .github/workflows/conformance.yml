name: conformance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (with mcp extra on 3.10+)
        run: |
          python -m pip install --upgrade pip
          if python -c 'import sys; sys.exit(0 if sys.version_info >= (3,10) else 1)'; then
            pip install -e '.[dev]'
          else
            pip install -e .
            pip install pytest
          fi

      - name: Run regression suite (cli lifecycle + events)
        run: pytest test/python/test_cli_lifecycle.py test/python/test_events.py -v

      - name: Run v3.1 CLI conformance
        run: pytest test/python/test_cli_v31.py -v

      - name: Run MCP server conformance (Python 3.10+)
        if: matrix.python-version != '3.9'
        run: pytest test/python/test_mcp_server.py -v
